<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bg)"/>
  <rect width="512" height="512" rx="128" fill="none" stroke="#00f0ff" stroke-width="6" filter="url(#glow)"/>
  <!-- Grid lines -->
  <g stroke="rgba(0,240,255,0.1)" stroke-width="2">
    <line x1="128" y1="64" x2="128" y2="448"/>
    <line x1="256" y1="64" x2="256" y2="448"/>
    <line x1="384" y1="64" x2="384" y2="448"/>
    <line x1="64" y1="128" x2="448" y2="128"/>
    <line x1="64" y1="256" x2="448" y2="256"/>
    <line x1="64" y1="384" x2="448" y2="384"/>
  </g>
  <!-- Neon G -->
  <text x="256" y="300" text-anchor="middle" font-family="monospace" font-weight="900" font-size="200" fill="#00f0ff" filter="url(#glow)">G</text>
  <!-- Small decorative squares -->
  <rect x="160" y="340" width="40" height="40" rx="4" fill="#ff00ff" filter="url(#glow)" opacity="0.8"/>
  <rect x="312" y="340" width="40" height="40" rx="4" fill="#00ff40" filter="url(#glow)" opacity="0.8"/>
  <rect x="236" y="380" width="40" height="40" rx="4" fill="#ffff00" filter="url(#glow)" opacity="0.8"/>
</svg>