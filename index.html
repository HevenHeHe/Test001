<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/icons/icon.svg">
    <title>GAME HUB // NEON PROTOCOL</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
</head>
<body class="page-lobby">
    <!-- ==================== LOBBY VIEW ==================== -->
    <div id="lobby" class="view active">
        <header class="app-header">
            <h1 class="app-title">GAME</h1>
            <p class="app-subtitle">NEON PROTOCOL</p>
        </header>
        
        <div class="games-grid" id="games-grid">
            <!-- Games loaded dynamically -->
        </div>
        
        <nav class="app-nav">
            <div class="nav-item active">
                <span class="nav-icon">🎮</span>
                <span>游戏</span>
            </div>
            <div class="nav-item">
                <span class="nav-icon">📊</span>
                <span>排行</span>
            </div>
            <div class="nav-item">
                <span class="nav-icon">⚙️</span>
                <span>设置</span>
            </div>
        </nav>
    </div>
    
    <!-- ==================== GAME VIEW ==================== -->
    <div id="game-view" class="view">
        <div class="game-header">
            <button id="btn-back" class="btn-icon">←</button>
            <h2 id="game-title" class="game-view-title">TETRIS</h2>
            <span id="game-highscore" class="highscore">🏆 0</span>
        </div>
        
        <div class="game-canvas-container" id="game-container">
            <!-- Game canvas injected here -->
        </div>
        
        <div class="game-controls" id="game-controls">
            <!-- Touch controls injected per game -->
        </div>
    </div>
    
    <!-- ==================== LOAD SCREEN ==================== -->
    <div id="load-screen" class="screen">
        <div class="load-spinner"></div>
        <p class="load-text">INITIALIZING...</p>
    </div>
    
    <script>
        // Register Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('SW registered'))
                    .catch(err => console.log('SW registration failed'));
            });
        }
    </script>
    <script src="js/utils.js"></script>
    <script src="js/audio-engine.js"></script>
    <script src="js/games-manifest.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
